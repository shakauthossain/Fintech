# Invoice Pipeline — Docker Compose
#
# Only the frontend is published (port 3001). The backend stays on the internal
# network; the Next.js app proxies /api/* to http://backend:8001.
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in secrets
#   docker compose up --build
#
# Production: https://fintech.riseo.online (nginx → localhost:3001)
#
# Google OAuth redirect URI (Google Cloud Console):
#   https://fintech.riseo.online/api/setup/google/callback

services:
  backend:
    build:
      context: ./backend
    container_name: invoice-pipeline-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: "8001"
      CORS_ORIGINS: https://fintech.riseo.online
      FRONTEND_URL: https://fintech.riseo.online
      GOOGLE_OAUTH_REDIRECT_URI: https://fintech.riseo.online/api/setup/google/callback
      AUTH_COOKIE_SECURE: "true"
    volumes:
      - ./backend/data:/app/data
    networks:
      - app
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        INTERNAL_API_URL: http://backend:8001
    container_name: invoice-pipeline-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      INTERNAL_API_URL: http://backend:8001
      NEXT_PUBLIC_API_BASE: ""
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge
